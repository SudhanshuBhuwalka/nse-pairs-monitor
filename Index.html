function rng(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}

// KEY FIX: Pre-generate shared sector factors so same-sector stocks correlate
const sectorFactors={};
Object.entries(SECTOR_SEEDS).forEach(([name,seed])=>{
const r=rng(seed*9973);
sectorFactors[name]=Array.from({length:DAYS},()=>{
const u=r(),v=r();
return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
});
});

const pc={};
function genP(st){
if(pc[st.t])return pc[st.t];
const r=rng(st.d*137+7);

const sf=sectorFactors[st.s]; // SHARED sector factor
const P=[st.p];
const sw=0.62; // high sector weight = high intra-sector correlation
for(let i=1;i<DAYS;i++){
const c=sw*sf[i]+(1-sw)*rn();
// Regime shifts for some stocks to create z-score deviations
const sh=(st.d%3===0&&i>80&&i<110)?0.005:
(st.d%4===0&&i>150&&i<175)?-0.006:
(st.d%5===0&&i>200&&i<225)?0.007:0;
P.push(P[i-1]*Math.exp(0.0003+0.019*c+sh));
}
pc[st.t]=P;return P;
}

function rCorr(a,b,w){
const rA=a.slice(1).map((v,i)=>Math.log(v/a[i]));
const rB=b.slice(1).map((v,i)=>Math.log(v/b[i]));
const o=new Array(a.length).fill(null);
for(let i=w;i<rA.length;i++){
const wA=rA.slice(i-w,i),wB=rB.slice(i-w,i);
const mA=wA.reduce((s,v)=>s+v,0)/w,mB=wB.reduce((s,v)=>s+v,0)/w;
let cv=0,vA=0,vB=0;
for(let j=0;j<w;j++){const da=wA[j]-mA,db=wB[j]-mB;cv+=da*db;vA+=da*da;vB+=db*db}
vA=Math.sqrt(vA/w);vB=Math.sqrt(vB/w);
o[i+1]=vA*vB===0?0:cv/(w*vA*vB);
}
return o;
}

function discover(cw,mc){

for(let j=i+1;j<stks.length;j++){
const co=rCorr(stks[i].prices,stks[j].prices,cw);
const v=co.filter(c=>c!==null);
if(!v.length)continue;
const cur=v[v.length-1];
const ok=Math.abs(cur)>=mc;
const rec=v.slice(-20).some(c=>Math.abs(c)>=mc);
if(!ok&&!rec)continue;
const ls=stks[i].prices.map((a,k)=>Math.log(a)-Math.log(stks[j].prices[k]));
const zs=ls.map((x,k)=>{if(k<cw)return null;const w=ls.slice(k-cw,k),m=w.reduce((s,x)=>s+x,0)/w.length,sd=Math.sqrt(w.reduce((s,x)=>s+(x-m)**2,0)/w.length);return sd===0?0:(x-m)/sd});

const cZ=vz.length?vz[vz.length-1]:0;

let sY=0,sX=0,sXY=0,sX2=0,n=0;

sec:stks[i].s===stks[j].s?stks[i].s:`${stks[i].s}脙聴${stks[j].s}`,

}
}
pairs.sort((a,b)=>Math.abs(b.z)-Math.abs(a.z));
return pairs;
}
