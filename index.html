<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

<script>
// SW

// DATA
var NSE=[
{t:“HDFCBANK”,s:“Banks”,d:10,p:1680},{t:“ICICIBANK”,s:“Banks”,d:11,p:1250},
{t:“KOTAKBANK”,s:“Banks”,d:12,p:1780},{t:“AXISBANK”,s:“Banks”,d:13,p:1150},
{t:“SBIN”,s:“Banks”,d:14,p:820},{t:“INDUSINDBK”,s:“Banks”,d:15,p:1420},
{t:“TCS”,s:“IT”,d:20,p:3950},{t:“INFY”,s:“IT”,d:21,p:1580},
{t:“WIPRO”,s:“IT”,d:22,p:480},{t:“HCLTECH”,s:“IT”,d:23,p:1720},
{t:“TECHM”,s:“IT”,d:24,p:1650},{t:“LTIM”,s:“IT”,d:25,p:5800},
{t:“RELIANCE”,s:“Energy”,d:30,p:2950},{t:“ONGC”,s:“Energy”,d:31,p:270},
{t:“BPCL”,s:“Energy”,d:32,p:620},{t:“HINDPETRO”,s:“Energy”,d:33,p:560},
{t:“TATASTEEL”,s:“Metals”,d:40,p:155},{t:“JSWSTEEL”,s:“Metals”,d:41,p:920},
{t:“HINDALCO”,s:“Metals”,d:42,p:640},{t:“VEDL”,s:“Metals”,d:43,p:440},
{t:“MARUTI”,s:“Auto”,d:50,p:12400},{t:“M&M”,s:“Auto”,d:51,p:2950},
{t:“TATAMOTORS”,s:“Auto”,d:52,p:780},{t:“BAJAJ-AUTO”,s:“Auto”,d:53,p:9200},
{t:“SUNPHARMA”,s:“Pharma”,d:60,p:1820},{t:“DRREDDY”,s:“Pharma”,d:61,p:6400},
{t:“CIPLA”,s:“Pharma”,d:62,p:1480},{t:“DIVISLAB”,s:“Pharma”,d:63,p:4200},
{t:“HINDUNILVR”,s:“FMCG”,d:70,p:2350},{t:“ITC”,s:“FMCG”,d:71,p:460},
{t:“NESTLEIND”,s:“FMCG”,d:72,p:2500},{t:“BRITANNIA”,s:“FMCG”,d:73,p:5600},
{t:“ULTRACEMCO”,s:“Cement”,d:80,p:11200},{t:“SHREECEM”,s:“Cement”,d:81,p:27000},
{t:“AMBUJACEM”,s:“Cement”,d:82,p:620},{t:“ACC”,s:“Cement”,d:83,p:2500},
{t:“BAJFINANCE”,s:“NBFC”,d:90,p:7200},{t:“BAJAJFINSV”,s:“NBFC”,d:91,p:1680},
{t:“HDFCLIFE”,s:“Insurance”,d:92,p:680},{t:“SBILIFE”,s:“Insurance”,d:93,p:1580}];
var DAYS=252,SC={Banks:”#f59e0b”,IT:”#22d3ee”,Energy:”#f472b6”,Metals:”#a78bfa”,Auto:”#34d399”,Pharma:”#fb923c”,FMCG:”#60a5fa”,Cement:”#e879f9”,NBFC:”#fbbf24”,Insurance:”#2dd4bf”};

function rng(s){return function(){s=(s*16807)%2147483647;return(s-1)/2147483646}}

// SHARED sector factors — this is the key fix
var SF={};
({Banks:1,IT:2,Energy:3,Metals:4,Auto:5,Pharma:6,FMCG:7,Cement:8,NBFC:9,Insurance:10});
var _ss={Banks:1,IT:2,Energy:3,Metals:4,Auto:5,Pharma:6,FMCG:7,Cement:8,NBFC:9,Insurance:10};
for(var sn in _ss){var _r=rng(_ss[sn]*9973);SF[sn]=[];for(var _i=0;_i<DAYS;_i++){var _u=_r(),_v=_r();SF[sn].push(Math.sqrt(-2*Math.log(_u))*Math.cos(2*Math.PI*_v))}}

var pc={};
function genP(st){
if(pc[st.t])return pc[st.t];
var r=rng(st.d*137+7);
var rn=function(){var u=r(),v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)};
var sf=SF[st.s],P=[st.p],sw=0.62;
for(var i=1;i<DAYS;i++){
var c=sw*sf[i]+(1-sw)*rn();
var sh=(st.d%3===0&&i>80&&i<110)?0.005:(st.d%4===0&&i>150&&i<175)?-0.006:(st.d%5===0&&i>200&&i<225)?0.007:0;
P.push(P[i-1]*Math.exp(0.0003+0.019*c+sh));
}
pc[st.t]=P;return P;
}

function rCor(a,b,w){
var rA=[],rB=[];
for(var i=1;i<a.length;i++){rA.push(Math.log(a[i]/a[i-1]));rB.push(Math.log(b[i]/b[i-1]))}
var o=[];for(var i=0;i<a.length;i++)o.push(null);
for(var i=w;i<rA.length;i++){
var wA=rA.slice(i-w,i),wB=rB.slice(i-w,i);
var mA=0,mB=0;for(var j=0;j<w;j++){mA+=wA[j];mB+=wB[j]}mA/=w;mB/=w;
var cv=0,vA=0,vB=0;for(var j=0;j<w;j++){var da=wA[j]-mA,db=wB[j]-mB;cv+=da*db;vA+=da*da;vB+=db*db}
vA=Math.sqrt(vA/w);vB=Math.sqrt(vB/w);
o[i+1]=vA*vB===0?0:cv/(w*vA*vB);
}
return o;
}

function disc(cw,mc){
var stks=NSE.map(function(s){return{t:s.t,s:s.s,d:s.d,p:s.p,prices:genP(s)}});
var pairs=[];
for(var i=0;i<stks.length;i++){
for(var j=i+1;j<stks.length;j++){
var co=rCor(stks[i].prices,stks[j].prices,cw);
var v=co.filter(function(c){return c!==null});
if(!v.length)continue;
var cur=v[v.length-1];
var ok=Math.abs(cur)>=mc;
var rec=v.slice(-20).some(function(c){return Math.abs(c)>=mc});
if(!ok&&!rec)continue;
var ls=stks[i].prices.map(function(a,k){return Math.log(a)-Math.log(stks[j].prices[k])});
var zs=ls.map(function(x,k){
if(k<cw)return null;
var w=ls.slice(k-cw,k),m=0;for(var q=0;q<w.length;q++)m+=w[q];m/=w.length;
var sd=0;for(var q=0;q<w.length;q++)sd+=(w[q]-m)*(w[q]-m);sd=Math.sqrt(sd/w.length);
return sd===0?0:(x-m)/sd;
});
var vz=zs.filter(function(z){return z!==null});
var cZ=vz.length?vz[vz.length-1]:0;
var pZ=vz.length>=2?vz[vz.length-2]:cZ;
var sY=0,sX=0,sXY=0,sX2=0,n=0;
for(var k=cw+1;k<ls.length;k++){var y=ls[k]-ls[k-1],x=ls[k-1];sY+=y;sX+=x;sXY+=x*y;sX2+=x*x;n++}
var beta=(n*sXY-sX*sY)/(n*sX2-sX*sX);
var hl=beta<0?-Math.log(2)/beta:null;
pairs.push({sA:stks[i],sB:stks[j],nm:stks[i].t+’ / ‘+stks[j].t,
sec:stks[i].s===stks[j].s?stks[i].s:stks[i].s+’ x ’+stks[j].s,
cross:stks[i].s!==stks[j].s,corr:cur,z:cZ,pz:pZ,hl:hl,sig:ok,em:!ok&&rec,
zs:zs,rcs:co,pA:stks[i].prices,pB:stks[j].prices});
}
}
pairs.sort(function(a,b){return Math.abs(b.z)-Math.abs(a.z)});
return pairs;
}

var _dd=[];(function(){var dt=new Date(“2025-03-03”);while(_dd.length<DAYS){if(dt.getDay()!==0&&dt.getDay()!==6)_dd.push(dt.toLocaleDateString(“en-IN”,{day:“2-digit”,month:“short”}));dt=new Date(dt);dt.setDate(dt.getDate()+1)}})();

// STATE
var S={lb:30,th:2,mc:0.60,tab:“scanner”,sel:null,sec:“ALL”,cross:false,srt:“zscore”,dv:“zscore”,als:[],ur:0,aOn:true,af:“ALL”,ch:null,prs:[],st:{},scs:[]};

function zC(z){var a=Math.abs(z);return a>=2.5?”#ef4444”:a>=2?”#f59e0b”:a>=1.5?”#a3a3a3”:”#22c55e”}
function dtH(z){if(z==null)return’’;var c=zC(z),a=Math.abs(z);return’<span style="width:7px;height:7px;border-radius:50%;background:'+c+';display:inline-block;box-shadow:'+(a>=2?'0 0 6px '+c:'none')+';'+(a>=2.5?'animation:pulse 1.5s infinite':'')+'"></span>’}
function bdg(z){if(z==null)return’’;var a=Math.abs(z),c,l;if(a>=2.5){c=”#ef4444”;l=“EXTREME”}else if(a>=2){c=”#f59e0b”;l=“STRONG”}else if(a>=1.5){c=”#78716c”;l=“MILD”}else{c=”#22c55e”;l=“NORMAL”}return’<span style="display:inline-flex;align-items:center;gap:4px;background:'+c+'15;color:'+c+';border:1px solid '+c+'22;border-radius:3px;padding:2px 8px;font-family:var(--mono);font-size:9px;font-weight:600">’+dtH(z)+’ ‘+l+’</span>’}
function tnow(){return new Date().toLocaleTimeString(“en-IN”,{hour:“2-digit”,minute:“2-digit”,second:“2-digit”,hour12:false})}

// COMPUTE
function comp(){
var p=disc(S.lb,S.mc);
if(!S.cross)p=p.filter(function(x){return!x.cross});
if(S.sec!==“ALL”)p=p.filter(function(x){return x.sec===S.sec||x.sA.s===S.sec||x.sB.s===S.sec});
if(S.srt===“corr”)p.sort(function(a,b){return Math.abs(b.corr)-Math.abs(a.corr)});
else if(S.srt===“hl”)p.sort(function(a,b){return(a.hl||999)-(b.hl||999)});
else p.sort(function(a,b){return Math.abs(b.z)-Math.abs(a.z)});
var ss={};p.forEach(function(x){ss[x.sA.s]=1;ss[x.sB.s]=1});
S.prs=p;
S.st={tot:p.length,ext:p.filter(function(x){return Math.abs(x.z)>=2.5}).length,str:p.filter(function(x){var a=Math.abs(x.z);return a>=2&&a<2.5}).length,em:p.filter(function(x){return x.em}).length};
S.scs=[“ALL”].concat(Object.keys(ss).sort());
if(!S.sel&&p.length)S.sel=p[0];
}

function R(){
comp();
var p=S.prs,st=S.st,h=’’;

// Toast

// Stats row
var qs=[{l:“EXTREME”,v:st.ext,c:”#ef4444”},{l:“STRONG”,v:st.str,c:”#f59e0b”},{l:“EMERGING”,v:st.em,c:”#22d3ee”},{l:“TOTAL”,v:st.tot,c:”#22c55e”}];

});
h+=’</div>’;

// === SCANNER ===
if(S.tab===“scanner”){
h+=’<div style="padding:10px 16px 0">’;
// Sectors
h+=’<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px">’;
S.scs.forEach(function(s){h+=’<div class=“tap chp ‘+(S.sec===s?‘on’:’’)+’” onclick=“S.sec='’+s.replace(”’”,””)+’';R();vb()”>’+s+’</div>’});
h+=’</div>’;
// Sliders
h+=’<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">’;
h+=’<div><div style="font-family:var(--mono);font-size:8px;color:var(--td)">MIN ρ: ‘+S.mc.toFixed(2)+’</div><input type="range" min="0.4" max="0.95" step="0.05" value="'+S.mc+'" oninput="S.mc=+this.value;R()"></div>’;
h+=’<div><div style="font-family:var(--mono);font-size:8px;color:var(--td)">WINDOW: ‘+S.lb+‘d</div><input type="range" min="10" max="90" value="'+S.lb+'" oninput="S.lb=+this.value;R()"></div>’;
h+=’<div><div style="font-family:var(--mono);font-size:8px;color:var(--td)">THRESH: ±’+S.th+’σ</div><input type="range" min="1" max="3.5" step="0.25" value="'+S.th+'" oninput="S.th=+this.value;R()"></div>’;
h+=’</div>’;
// Sort
h+=’<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px"><div style="display:flex;gap:4px">’;
[{k:“zscore”,l:”|Z|”},{k:“corr”,l:”ρ”},{k:“hl”,l:“t½”}].forEach(function(s){
h+=’<div class="tap" style="padding:4px 10px;border-radius:4px;background:'+(S.srt===s.k?'var(--ad)':'transparent')+';border:1px solid '+(S.srt===s.k?'var(--al)':'var(--b1)')+';font-family:var(--mono);font-size:9px;font-weight:600;color:'+(S.srt===s.k?'var(--accent)':'var(--td)')+'" onclick="S.srt=\''+s.k+'\';R();vb()">’+s.l+’</div>’;
});
h+=’</div><div style="display:flex;gap:8px">’;
h+=’<label style="display:flex;align-items:center;gap:4px"><input type=“checkbox” ‘+(S.cross?‘checked’:’’)+’ onchange=“S.cross=this.checked;R()” style=“accent-color:var(–accent);width:14px;height:14px”><span style="font-family:var(--mono);font-size:9px;color:var(--td)">X-SEC</span></label>’;

h+=’</div></div></div>’;

```

h+='<div style="margin-top:6px;max-height:calc(100dvh - 360px);overflow-y:auto;padding:0 8px">';
