<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090f">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>NSE Pairs Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
:root{--bg:#08090f;--s1:rgba(255,255,255,0.015);--s2:rgba(255,255,255,0.03);--b1:rgba(255,255,255,0.04);--accent:#d97706;--ad:rgba(217,119,6,0.12);--al:rgba(217,119,6,0.3);--t:#d6d3d1;--td:#57534e;--tm:#78716c;--tb:#fafaf9;--g:#22c55e;--r:#ef4444;--cy:#22d3ee;--pk:#f472b6;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',-apple-system,sans-serif;--serif:'Instrument Serif',serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{overscroll-behavior:none}
body{background:var(--bg);color:var(--t);font-family:var(--sans);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}

/* Scrollbar */
::-webkit-scrollbar{width:2px;height:2px}::-webkit-scrollbar-thumb{background:rgba(217,119,6,0.2);border-radius:1px}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}
@keyframes bellRing{0%{transform:rotate(0)}10%{transform:rotate(14deg)}20%{transform:rotate(-12deg)}30%{transform:rotate(8deg)}40%{transform:rotate(-6deg)}50%{transform:rotate(0)}}
@keyframes scanPulse{0%,100%{opacity:0.4}50%{opacity:1}}

/* Touch */
.tap{transition:all 0.1s;cursor:pointer;user-select:none;-webkit-user-select:none}.tap:active{transform:scale(0.96);opacity:0.85}
.row-tap{transition:background 0.1s;cursor:pointer}.row-tap:active{background:rgba(217,119,6,0.08)!important}

/* Install banner */
.install-banner{position:fixed;bottom:env(safe-area-inset-bottom,0);left:0;right:0;z-index:999;padding:12px 16px;background:rgba(14,16,22,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--al);display:flex;align-items:center;gap:12px;animation:slideUp 0.4s ease}
.install-banner .ib-icon{width:40px;height:40px;border-radius:10px;background:var(--ad);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.install-banner .ib-text{flex:1;font-family:var(--mono);font-size:11px;color:var(--t);line-height:1.5}
.install-banner .ib-text strong{color:var(--accent)}
.install-banner .ib-btn{padding:8px 16px;border-radius:6px;background:var(--accent);color:var(--bg);font-family:var(--mono);font-size:11px;font-weight:700;border:none;cursor:pointer;white-space:nowrap}
.install-banner .ib-close{font-size:18px;color:var(--td);cursor:pointer;padding:4px}

/* Toast */
.toast-container{position:fixed;top:env(safe-area-inset-top,8px);left:8px;right:8px;z-index:1000;pointer-events:none}
.toast-container>div{pointer-events:auto}
.toast{background:rgba(14,16,22,0.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;animation:toastIn 0.35s cubic-bezier(0.16,1,0.3,1) both;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.toast.exit{transform:translateX(110%);opacity:0;transition:all 0.35s cubic-bezier(0.4,0,0.2,1)}

/* Range inputs for mobile */
input[type=range]{-webkit-appearance:none;width:100%;height:24px;background:transparent;touch-action:none}
input[type=range]::-webkit-slider-track{height:3px;background:rgba(217,119,6,0.12);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);margin-top:-8px;border:3px solid var(--bg);box-shadow:0 0 8px rgba(217,119,6,0.3)}

/* Chip */
.chip{flex-shrink:0;padding:5px 12px;border-radius:14px;font-family:var(--mono);font-size:10px;font-weight:500;border:1px solid var(--b1);background:var(--s1)}
.chip.active{background:var(--ad);border-color:var(--al);color:var(--accent)}
.chip.inactive{color:var(--tm)}

/* Card */
.card{background:var(--s1);border:1px solid var(--s2);border-radius:8px;padding:10px 12px}

/* Chart */
.chart-box{background:var(--s1);border:1px solid var(--s2);border-radius:10px;padding:12px 8px 4px}
.chart-wrap{position:relative;width:100%;height:220px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// SERVICE WORKER + PWA INSTALL
// ═══════════════════════════════════════════════════════════════════════
let deferredPrompt = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(err => console.log('SW error:', err));
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.querySelector('.install-banner')) return;
  const b = document.createElement('div');
  b.className = 'install-banner';
  b.innerHTML = `
    <div class="ib-icon">📊</div>
    <div class="ib-text"><strong>Install Pairs Monitor</strong><br>Add to home screen for native app experience</div>
    <button class="ib-btn" onclick="installPWA()">INSTALL</button>
    <div class="ib-close" onclick="this.parentElement.remove()">×</div>
  `;
  document.body.appendChild(b);
}

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r => {
    deferredPrompt = null;
    document.querySelector('.install-banner')?.remove();
  });
}

// Request notification permission
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendLocalNotif(title, body, tag) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: './icon-192.png', badge: './icon-192.png', tag: tag || 'pairs', vibrate: [100, 50, 100], silent: false });
  }
}

// Haptic feedback
function haptic(style) {
  if (navigator.vibrate) {
    if (style === 'heavy') navigator.vibrate([50, 30, 50]);
    else if (style === 'light') navigator.vibrate(10);
    else navigator.vibrate(25);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// DATA ENGINE (same as React version)
// ═══════════════════════════════════════════════════════════════════════
const NSE=[{t:"HDFCBANK",s:"Banks",d:10,p:1680},{t:"ICICIBANK",s:"Banks",d:11,p:1250},{t:"KOTAKBANK",s:"Banks",d:12,p:1780},{t:"AXISBANK",s:"Banks",d:13,p:1150},{t:"SBIN",s:"Banks",d:14,p:820},{t:"INDUSINDBK",s:"Banks",d:15,p:1420},{t:"TCS",s:"IT",d:20,p:3950},{t:"INFY",s:"IT",d:21,p:1580},{t:"WIPRO",s:"IT",d:22,p:480},{t:"HCLTECH",s:"IT",d:23,p:1720},{t:"TECHM",s:"IT",d:24,p:1650},{t:"LTIM",s:"IT",d:25,p:5800},{t:"RELIANCE",s:"Energy",d:30,p:2950},{t:"ONGC",s:"Energy",d:31,p:270},{t:"BPCL",s:"Energy",d:32,p:620},{t:"HINDPETRO",s:"Energy",d:33,p:560},{t:"TATASTEEL",s:"Metals",d:40,p:155},{t:"JSWSTEEL",s:"Metals",d:41,p:920},{t:"HINDALCO",s:"Metals",d:42,p:640},{t:"VEDL",s:"Metals",d:43,p:440},{t:"MARUTI",s:"Auto",d:50,p:12400},{t:"M&M",s:"Auto",d:51,p:2950},{t:"TATAMOTORS",s:"Auto",d:52,p:780},{t:"BAJAJ-AUTO",s:"Auto",d:53,p:9200},{t:"SUNPHARMA",s:"Pharma",d:60,p:1820},{t:"DRREDDY",s:"Pharma",d:61,p:6400},{t:"CIPLA",s:"Pharma",d:62,p:1480},{t:"DIVISLAB",s:"Pharma",d:63,p:4200},{t:"HINDUNILVR",s:"FMCG",d:70,p:2350},{t:"ITC",s:"FMCG",d:71,p:460},{t:"NESTLEIND",s:"FMCG",d:72,p:2500},{t:"BRITANNIA",s:"FMCG",d:73,p:5600},{t:"ULTRACEMCO",s:"Cement",d:80,p:11200},{t:"SHREECEM",s:"Cement",d:81,p:27000},{t:"AMBUJACEM",s:"Cement",d:82,p:620},{t:"ACC",s:"Cement",d:83,p:2500},{t:"BAJFINANCE",s:"NBFC",d:90,p:7200},{t:"BAJAJFINSV",s:"NBFC",d:91,p:1680},{t:"HDFCLIFE",s:"Insurance",d:92,p:680},{t:"SBILIFE",s:"Insurance",d:93,p:1580}];
const DAYS=252;
const SC={Banks:"#f59e0b",IT:"#22d3ee",Energy:"#f472b6",Metals:"#a78bfa",Auto:"#34d399",Pharma:"#fb923c",FMCG:"#60a5fa",Cement:"#e879f9",NBFC:"#fbbf24",Insurance:"#2dd4bf"};
const pc={};
function rng(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
function genP(st){if(pc[st.t])return pc[st.t];const r=rng(st.d*137+7),rn=()=>{const u=r(),v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)},sr=rng(st.d*31),sf=Array.from({length:DAYS},()=>{const u=sr(),v=sr();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)});const P=[st.p];for(let i=1;i<DAYS;i++){const c=0.55*sf[i]+0.45*rn(),sh=(st.d%5===0&&i>100&&i<130)?0.004:(st.d%7===0&&i>180&&i<210)?-0.005:0;P.push(P[i-1]*Math.exp(0.0003+0.019*c+sh))}pc[st.t]=P;return P}
function rCorr(a,b,w){const rA=a.slice(1).map((v,i)=>Math.log(v/a[i])),rB=b.slice(1).map((v,i)=>Math.log(v/b[i])),o=new Array(a.length).fill(null);for(let i=w;i<rA.length;i++){const wA=rA.slice(i-w,i),wB=rB.slice(i-w,i),mA=wA.reduce((s,v)=>s+v,0)/w,mB=wB.reduce((s,v)=>s+v,0)/w;let cv=0,vA=0,vB=0;for(let j=0;j<w;j++){const da=wA[j]-mA,db=wB[j]-mB;cv+=da*db;vA+=da*da;vB+=db*db}vA=Math.sqrt(vA/w);vB=Math.sqrt(vB/w);o[i+1]=vA*vB===0?0:cv/(w*vA*vB)}return o}
function discover(cw,mc){const stks=NSE.map(s=>({...s,prices:genP(s)})),pairs=[];for(let i=0;i<stks.length;i++)for(let j=i+1;j<stks.length;j++){const co=rCorr(stks[i].prices,stks[j].prices,cw),v=co.filter(c=>c!==null);if(!v.length)continue;const cur=v[v.length-1],ok=Math.abs(cur)>=mc,rec=v.slice(-20).some(c=>Math.abs(c)>=mc);if(!ok&&!rec)continue;const ls=stks[i].prices.map((a,k)=>Math.log(a)-Math.log(stks[j].prices[k])),zs=ls.map((x,k)=>{if(k<cw)return null;const w=ls.slice(k-cw,k),m=w.reduce((s,x)=>s+x,0)/w.length,sd=Math.sqrt(w.reduce((s,x)=>s+(x-m)**2,0)/w.length);return sd===0?0:(x-m)/sd}),vz=zs.filter(z=>z!==null),cZ=vz.pop()||0,pZ=vz.length?vz[vz.length-1]:cZ;let sY=0,sX=0,sXY=0,sX2=0,n=0;for(let k=cw+1;k<ls.length;k++){const y=ls[k]-ls[k-1],x=ls[k-1];sY+=y;sX+=x;sXY+=x*y;sX2+=x*x;n++}const b=(n*sXY-sX*sY)/(n*sX2-sX*sX),hl=b<0?-Math.log(2)/b:null,ct=v.length>=10?(v.slice(-5).reduce((s,x)=>s+x,0)/5)-(v.slice(-10,-5).reduce((s,x)=>s+x,0)/5):0;pairs.push({sA:stks[i],sB:stks[j],name:`${stks[i].t} / ${stks[j].t}`,sec:stks[i].s===stks[j].s?stks[i].s:`${stks[i].s}×${stks[j].s}`,cross:stks[i].s!==stks[j].s,corr:cur,ct,z:cZ,pz:pZ,hl,sig:ok,em:!ok&&rec,zs,ls,rcs:co,pA:stks[i].prices,pB:stks[j].prices})}pairs.sort((a,b)=>Math.abs(b.z)-Math.abs(a.z));return pairs}
function tDates(n){const d=[];let dt=new Date("2025-03-03");while(d.length<n){if(dt.getDay()!==0&&dt.getDay()!==6)d.push(dt.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}));dt=new Date(dt);dt.setDate(dt.getDate()+1)}return d}
const DATES=tDates(DAYS);

// ═══════════════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════════════
let S={lb:30,th:2,mc:0.70,tab:"scanner",sel:null,sec:"ALL",cross:false,sort:"zscore",dv:"zscore",alerts:[],toasts:[],unread:0,alertsOn:true,af:"ALL",chart:null,pairs:[],stats:{}};

function zColor(z){const a=Math.abs(z);return a>=2.5?"#ef4444":a>=2?"#f59e0b":a>=1.5?"#a3a3a3":"#22c55e"}
function dotH(z){if(z==null)return'';const a=Math.abs(z),c=zColor(z);return`<span style="width:7px;height:7px;border-radius:50%;background:${c};display:inline-block;box-shadow:${a>=2?`0 0 6px ${c}`:'none'};${a>=2.5?'animation:pulse 1.5s infinite':''}"></span>`}
function badgeH(z){if(z==null)return'<span style="color:#3f3f46">—</span>';const a=Math.abs(z);let c,l;if(a>=2.5){c="#ef4444";l="EXTREME"}else if(a>=2){c="#f59e0b";l="STRONG"}else if(a>=1.5){c="#78716c";l="MILD"}else{c="#22c55e";l="NORMAL"}return`<span style="display:inline-flex;align-items:center;gap:4px;background:${c}15;color:${c};border:1px solid ${c}22;border-radius:3px;padding:1px 7px;font-family:var(--mono);font-size:9px;font-weight:600">${dotH(z)} ${l}</span>`}
function ts(){return new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false})}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function compute(){
  let p=discover(S.lb,S.mc);
  if(!S.cross)p=p.filter(x=>!x.cross);
  if(S.sec!=="ALL")p=p.filter(x=>x.sec===S.sec||x.sA.s===S.sec||x.sB.s===S.sec);
  if(S.sort==="corr")p.sort((a,b)=>Math.abs(b.corr)-Math.abs(a.corr));
  else if(S.sort==="halflife")p.sort((a,b)=>(a.hl||999)-(b.hl||999));
  else p.sort((a,b)=>Math.abs(b.z)-Math.abs(a.z));
  const ss=new Set();p.forEach(x=>{ss.add(x.sA.s);ss.add(x.sB.s)});
  S.pairs=p;
  S.stats={total:p.length,extreme:p.filter(x=>Math.abs(x.z)>=2.5).length,strong:p.filter(x=>Math.abs(x.z)>=2&&Math.abs(x.z)<2.5).length,emerging:p.filter(x=>x.em).length};
  S.sectors=["ALL",...Array.from(ss).sort()];
  if(!S.sel&&p.length)S.sel=p[0];
}

function render(){
  compute();
  const app=document.getElementById('app');
  const p=S.pairs,st=S.stats;
  let h='';

  // Toasts
  h+=`<div class="toast-container" id="toastBox"></div>`;

  // Header
  h+=`<div style="padding:max(env(safe-area-inset-top),14px) 16px 0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><h1 style="font-family:var(--serif);font-size:22px;font-weight:400;color:var(--tb);letter-spacing:-0.3px">Pairs Monitor</h1>
      <div style="font-family:var(--mono);font-size:9.5px;color:var(--td);margin-top:1px">NSE F&O · Live Alerts · ${NSE.length} stocks ${S.alertsOn?'<span style="animation:scanPulse 2s infinite;color:#22c55e">●</span>':''}</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="tap" onclick="S.tab='alerts';S.unread=0;render();haptic('light')" style="position:relative;padding:4px">
          <span style="font-size:20px;${S.unread>0?'animation:bellRing 0.6s ease;':''}display:inline-block">🔔</span>
          ${S.unread>0?`<span style="position:absolute;top:0;right:0;background:#ef4444;color:#fff;font-size:8px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);border:2px solid var(--bg)">${S.unread>9?'9+':S.unread}</span>`:''}
        </div>
        <div style="text-align:right"><div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent)">${st.total}</div><div style="font-family:var(--mono);font-size:8.5px;color:var(--td);letter-spacing:0.5px">PAIRS</div></div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px">${[{l:"EXTREME",v:st.extreme,c:"#ef4444"},{l:"STRONG",v:st.strong,c:"#f59e0b"},{l:"EMERGING",v:st.emerging,c:"#22d3ee"},{l:"ρ≥"+S.mc,v:st.total,c:"#22c55e"}].map(s=>`<div style="flex:1;background:${s.c}08;border:1px solid ${s.c}18;border-radius:6px;padding:7px 4px;text-align:center"><div style="font-family:var(--mono);font-size:16px;font-weight:700;color:${s.c}">${s.v}</div><div style="font-family:var(--mono);font-size:7px;color:var(--td);letter-spacing:0.5px;margin-top:1px">${s.l}</div></div>`).join('')}</div>
  </div>`;

  // Tabs
  const tabs=[{k:"scanner",l:"SCANNER"},{k:"detail",l:"DETAIL"},{k:"alerts",l:"ALERTS"}];
  h+=`<div style="display:flex;margin:10px 16px 0;border-bottom:1px solid rgba(217,119,6,0.06)">${tabs.map(t=>`<div class="tap" onclick="S.tab='${t.k}';${t.k==='alerts'?'S.unread=0;':''}render();haptic('light')" style="flex:1;text-align:center;padding:9px 0;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.5px;color:${S.tab===t.k?'var(--accent)':'var(--td)'};border-bottom:2px solid ${S.tab===t.k?'var(--accent)':'transparent'};position:relative">${t.l}${t.k==='alerts'&&S.unread>0?'<span style="position:absolute;top:4px;right:20%;width:6px;height:6px;border-radius:50%;background:#ef4444"></span>':''}</div>`).join('')}</div>`;

  // ─── SCANNER ─────────────────────────────────────────────────
  if(S.tab==="scanner"){
    // Sector pills
    h+=`<div style="padding:10px 16px 0"><div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch">${(S.sectors||["ALL"]).map(s=>`<div class="tap chip ${S.sec===s?'active':'inactive'}" onclick="S.sec='${s}';render();haptic('light')">${s}${s!=='ALL'?`<span style="font-size:8px;margin-left:3px;opacity:0.5;color:${SC[s]||'#78716c'}">●</span>`:''}</div>`).join('')}</div>`;
    // Sliders
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:2px">
      <div><div style="font-family:var(--mono);font-size:8px;color:var(--td);letter-spacing:0.8px">MIN ρ: ${S.mc.toFixed(2)}</div><input type="range" min="0.5" max="0.95" step="0.05" value="${S.mc}" oninput="S.mc=+this.value;render()"></div>
      <div><div style="font-family:var(--mono);font-size:8px;color:var(--td);letter-spacing:0.8px">LOOKBACK: ${S.lb}d</div><input type="range" min="10" max="90" value="${S.lb}" oninput="S.lb=+this.value;render()"></div>
      <div><div style="font-family:var(--mono);font-size:8px;color:var(--td);letter-spacing:0.8px">THRESH: ±${S.th}σ</div><input type="range" min="1" max="3.5" step="0.25" value="${S.th}" oninput="S.th=+this.value;render()"></div>
    </div>`;
    // Sort + toggles
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
      <div style="display:flex;gap:4px">${[{k:"zscore",l:"|Z|"},{k:"corr",l:"ρ"},{k:"halflife",l:"t½"}].map(s=>`<div class="tap" onclick="S.sort='${s.k}';render();haptic('light')" style="padding:3px 8px;border-radius:3px;background:${S.sort===s.k?'var(--ad)':'transparent'};border:1px solid ${S.sort===s.k?'var(--al)':'var(--b1)'};font-family:var(--mono);font-size:9px;font-weight:600;color:${S.sort===s.k?'var(--accent)':'var(--td)'}">${s.l}</div>`).join('')}</div>
      <div style="display:flex;gap:10px;align-items:center">
        <label style="display:flex;align-items:center;gap:5px"><input type="checkbox" ${S.cross?'checked':''} onchange="S.cross=this.checked;render()" style="accent-color:var(--accent);width:14px;height:14px"><span style="font-family:var(--mono);font-size:9px;color:var(--td)">X-SEC</span></label>
        <label style="display:flex;align-items:center;gap:5px"><input type="checkbox" ${S.alertsOn?'checked':''} onchange="S.alertsOn=this.checked;render()" style="accent-color:#22c55e;width:14px;height:14px"><span style="font-family:var(--mono);font-size:9px;color:${S.alertsOn?'#22c55e':'var(--td)'}">🔔</span></label>
      </div>
    </div></div>`;
    // Pairs list
    h+=`<div style="margin-top:6px;max-height:calc(100vh - 350px);max-height:calc(100dvh - 350px);overflow-y:auto;padding:0 8px;-webkit-overflow-scrolling:touch">`;
    if(!p.length) h+=`<div style="text-align:center;padding:40px;color:#3f3f46;font-family:var(--mono);font-size:11px">No pairs found. Lower ρ.</div>`;
    p.forEach((pair,i)=>{
      const az=Math.abs(pair.z),hot=az>=S.th;
      h+=`<div class="row-tap" onclick="S.sel=S.pairs[${i}];S.tab='detail';S.dv='zscore';render();haptic()" style="padding:9px 10px;margin:0 0 1px;background:${hot?'rgba(217,119,6,0.03)':'transparent'};border-left:3px solid ${hot?(az>=2.5?'#ef4444':'#f59e0b'):'transparent'};border-radius:4px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px">
              ${dotH(pair.z)}<span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${hot?'var(--tb)':'#a8a29e'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${pair.name}</span>
              ${pair.em?'<span style="font-family:var(--mono);font-size:7.5px;color:#22d3ee;background:rgba(34,211,238,0.1);padding:1px 5px;border-radius:2px;font-weight:600">NEW</span>':''}
            </div>
            <div style="display:flex;gap:8px;margin-top:2px">
              <span style="font-family:var(--mono);font-size:9px;color:${SC[pair.sA.s]||'var(--td)'}">${pair.sec}</span>
              ${pair.hl?`<span style="font-family:var(--mono);font-size:9px;color:${pair.hl<15?'#22c55e':'var(--td)'}">t½=${pair.hl.toFixed(0)}d</span>`:''}
              <span style="font-family:var(--mono);font-size:9px;color:${pair.z>0?'#f59e0b88':'#22d3ee88'}">${pair.z>0?'A RICH':'B RICH'}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px">
            <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:${zColor(pair.z)}">${pair.z>0?'+':''}${pair.z.toFixed(2)}</div>
            <span style="font-family:var(--mono);font-size:10px;font-weight:600;color:${pair.em?'#f59e0b':pair.corr>=0.85?'#22c55e':pair.corr>=0.7?'#a3a3a3':'#ef4444'};background:${(pair.em?'#f59e0b':pair.corr>=0.85?'#22c55e':'#a3a3a3')}12;padding:1px 6px;border-radius:3px">${pair.em?'↗ ':''}${pair.corr.toFixed(2)}</span>
          </div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  // ─── ALERTS ──────────────────────────────────────────────────
  if(S.tab==="alerts"){
    const fa=S.af==="ALL"?S.alerts:S.alerts.filter(a=>a.type===S.af);
    h+=`<div style="padding:10px 12px;animation:fadeIn 0.2s">`;
    h+=`<div style="display:flex;gap:4px;overflow-x:auto;margin-bottom:8px;-webkit-overflow-scrolling:touch">${["ALL","EXTREME","BREACH","NEW","FAST","REVERT","CORRBREAK"].map(f=>`<div class="tap chip ${S.af===f?'active':'inactive'}" onclick="S.af='${f}';render();haptic('light')">${f}</div>`).join('')}<div class="tap chip inactive" onclick="S.alerts=[];render()">CLEAR</div></div>`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:6px;margin-bottom:8px;background:${S.alertsOn?'rgba(34,197,94,0.04)':'var(--s1)'};border:1px solid ${S.alertsOn?'rgba(34,197,94,0.12)':'var(--s2)'}">
      <div><div style="font-family:var(--mono);font-size:10.5px;font-weight:600;color:${S.alertsOn?'#22c55e':'var(--td)'}">${S.alertsOn?'● LIVE MONITORING':'○ PAUSED'}</div><div style="font-family:var(--mono);font-size:9px;color:var(--td);margin-top:1px">Scanning ${p.length} pairs · ~7s</div></div>
      <div class="tap" onclick="S.alertsOn=!S.alertsOn;render();haptic()" style="padding:6px 12px;border-radius:4px;background:${S.alertsOn?'rgba(239,68,68,0.08)':'rgba(34,197,94,0.08)'};border:1px solid ${S.alertsOn?'rgba(239,68,68,0.2)':'rgba(34,197,94,0.2)'};font-family:var(--mono);font-size:9.5px;font-weight:600;color:${S.alertsOn?'#ef4444':'#22c55e'}">${S.alertsOn?'PAUSE':'RESUME'}</div>
    </div>`;
    h+=`<div style="max-height:calc(100vh - 310px);max-height:calc(100dvh - 310px);overflow-y:auto;-webkit-overflow-scrolling:touch">`;
    if(!fa.length)h+=`<div style="text-align:center;padding:50px;color:#3f3f46;font-family:var(--mono);font-size:11px">${S.alertsOn?'Monitoring... alerts incoming.':'Paused.'}</div>`;
    fa.forEach((a,i)=>{
      h+=`<div class="row-tap" onclick="if(S.pairs[${a.pIdx}]){S.sel=S.pairs[${a.pIdx}];S.tab='detail';S.dv='zscore';render();haptic()}" style="padding:10px;margin-bottom:2px;border-radius:6px;background:var(--s1);border-left:3px solid ${a.color}">
        <div style="display:flex;align-items:flex-start;gap:8px">
          <span style="font-size:14px;margin-top:1px">${a.icon}</span>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between"><span style="font-family:var(--mono);font-size:8.5px;font-weight:700;color:${a.color};letter-spacing:0.3px">${a.title}</span><span style="font-family:var(--mono);font-size:8px;color:#3f3f46">${a.time}</span></div>
            <div style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--t);margin-top:1px">${a.pair}</div>
            <div style="font-family:var(--mono);font-size:9.5px;color:var(--td);margin-top:1px">${a.body}</div>
          </div>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  // ─── DETAIL ──────────────────────────────────────────────────
  if(S.tab==="detail"&&S.sel){
    const s=S.sel;
    h+=`<div style="padding:10px 12px 20px;animation:fadeIn 0.2s">`;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div class="tap" onclick="S.tab='scanner';render();haptic('light')" style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--s1);border:1px solid var(--s2);font-family:var(--mono);font-size:16px;color:var(--tm)">←</div>
      <div style="flex:1"><div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--tb)">${s.name}</div><div style="font-family:var(--mono);font-size:9px;color:${SC[s.sA.s]||'var(--td)'}">${s.sec}${s.cross?' · CROSS':''}</div></div>
      ${badgeH(s.z)}
    </div>`;
    // Stats
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">${[{l:"Z-SCORE",v:(s.z>0?"+":"")+s.z.toFixed(3),c:Math.abs(s.z)>=2?'var(--accent)':'var(--t)'},{l:"CORR (ρ)",v:s.corr.toFixed(3),c:s.corr<0.7?'#ef4444':'#22c55e'},{l:"HALF-LIFE",v:s.hl?s.hl.toFixed(1)+'d':'N/A',c:s.hl&&s.hl<15?'#22c55e':'var(--tm)'}].map(x=>`<div class="card" style="text-align:center"><div style="font-family:var(--mono);font-size:7.5px;color:var(--td);letter-spacing:0.8px">${x.l}</div><div style="font-family:var(--mono);font-size:18px;font-weight:700;color:${x.c};margin-top:2px">${x.v}</div></div>`).join('')}</div>`;
    // Direction
    h+=`<div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;border-radius:6px;background:${Math.abs(s.z)>=S.th?'rgba(217,119,6,0.05)':'var(--s1)'};border:1px solid ${Math.abs(s.z)>=S.th?'rgba(217,119,6,0.12)':'var(--s2)'}">
      <span style="font-family:var(--mono);font-size:11px;font-weight:600;color:${s.z>0?'#22d3ee':'var(--tm)'}">${s.sA.t}</span>
      <span style="font-family:var(--mono);font-size:9px;color:var(--td)">${s.z>0?'← SHORT':'← LONG'}</span>
      <span style="font-family:var(--mono);font-size:14px;color:var(--accent)">⟷</span>
      <span style="font-family:var(--mono);font-size:9px;color:var(--td)">${s.z>0?'LONG →':'SHORT →'}</span>
      <span style="font-family:var(--mono);font-size:11px;font-weight:600;color:${s.z<=0?'#f472b6':'var(--tm)'}">${s.sB.t}</span>
    </div>`;
    // Chart toggles
    h+=`<div style="display:flex;gap:4px;margin-bottom:8px">${[{k:"zscore",l:"Z-Score"},{k:"prices",l:"Prices"},{k:"corr",l:"Corr"}].map(v=>`<div class="tap" onclick="S.dv='${v.k}';render();haptic('light')" style="flex:1;text-align:center;padding:7px 0;border-radius:6px;background:${S.dv===v.k?'var(--ad)':'var(--s1)'};border:1px solid ${S.dv===v.k?'var(--al)':'var(--s2)'};font-family:var(--mono);font-size:10px;font-weight:600;color:${S.dv===v.k?'var(--accent)':'var(--td)'}">${v.l}</div>`).join('')}</div>`;
    // Chart canvas
    h+=`<div class="chart-box"><div class="chart-wrap"><canvas id="pairChart"></canvas></div></div>`;
    // Corr status
    h+=`<div style="margin-top:8px;padding:8px 10px;border-radius:6px;background:${s.em?'rgba(34,211,238,0.04)':'var(--s1)'};border:1px solid ${s.em?'rgba(34,211,238,0.12)':'var(--s2)'}">
      <div style="font-family:var(--mono);font-size:8px;color:var(--td);letter-spacing:0.8px;margin-bottom:3px">CORRELATION STATUS</div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px">
        <span style="color:var(--tm)">Now: <span style="color:${s.corr>=S.mc?'#22c55e':'#ef4444'};font-weight:600">${s.corr.toFixed(3)}</span></span>
        <span style="color:var(--tm)">Trend: <span style="color:${s.ct>0?'#22c55e':'#ef4444'}">${s.ct>0?'↑':'↓'}${Math.abs(s.ct).toFixed(3)}</span></span>
      </div>
      ${s.em?`<div style="font-family:var(--mono);font-size:9px;color:#22d3ee;margin-top:5px;padding:4px 8px;background:rgba(34,211,238,0.06);border-radius:3px">⚡ EMERGING — ρ recently crossed ${S.mc}. Monitor before trading.</div>`:''}
    </div>`;
    h+=`</div>`;
  }

  app.innerHTML=h;

  // Draw chart after DOM update
  if(S.tab==="detail"&&S.sel){
    requestAnimationFrame(()=>drawChart());
  }
}

// ═══════════════════════════════════════════════════════════════════════
// CHART (Chart.js)
// ═══════════════════════════════════════════════════════════════════════
function drawChart(){
  const canvas=document.getElementById('pairChart');
  if(!canvas||!S.sel)return;
  if(S.chart){S.chart.destroy();S.chart=null;}
  const ctx=canvas.getContext('2d');
  const s=S.sel;
  let cfg;

  if(S.dv==="zscore"){
    const zd=s.zs.map(v=>v===null?NaN:v);
    cfg={type:'line',data:{labels:DATES,datasets:[{label:'Z-Score',data:zd,borderColor:'#d97706',backgroundColor:'rgba(217,119,6,0.08)',fill:true,borderWidth:1.5,pointRadius:0,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'#3f3f46',font:{size:8},maxTicksLimit:8},grid:{color:'rgba(217,119,6,0.03)'}},y:{min:-4,max:4,ticks:{color:'#3f3f46',font:{size:8}},grid:{color:'rgba(217,119,6,0.03)'}}},plugins:{legend:{display:false},annotation:{annotations:{u:{type:'line',yMin:S.th,yMax:S.th,borderColor:'rgba(217,119,6,0.4)',borderDash:[4,3]},l:{type:'line',yMin:-S.th,yMax:-S.th,borderColor:'rgba(217,119,6,0.4)',borderDash:[4,3]},z:{type:'line',yMin:0,yMax:0,borderColor:'rgba(255,255,255,0.05)'}}},tooltip:{backgroundColor:'rgba(8,10,16,0.96)',borderColor:'rgba(217,119,6,0.15)',borderWidth:1,cornerRadius:4,titleFont:{family:'IBM Plex Mono',size:9},bodyFont:{family:'IBM Plex Mono',size:9}}}}};
  }else if(S.dv==="prices"){
    const pa=s.pA.map(v=>+(v/s.pA[0]*100).toFixed(2)),pb=s.pB.map(v=>+(v/s.pB[0]*100).toFixed(2));
    cfg={type:'line',data:{labels:DATES,datasets:[{label:s.sA.t,data:pa,borderColor:'#22d3ee',borderWidth:1.3,pointRadius:0,tension:0.3},{label:s.sB.t,data:pb,borderColor:'#f472b6',borderWidth:1.3,pointRadius:0,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'#3f3f46',font:{size:8},maxTicksLimit:8},grid:{color:'rgba(217,119,6,0.03)'}},y:{ticks:{color:'#3f3f46',font:{size:8}},grid:{color:'rgba(217,119,6,0.03)'}}},plugins:{legend:{display:true,position:'top',labels:{color:'#78716c',font:{family:'IBM Plex Mono',size:9},boxWidth:10,padding:12}},tooltip:{backgroundColor:'rgba(8,10,16,0.96)',borderColor:'rgba(217,119,6,0.15)',borderWidth:1,cornerRadius:4,titleFont:{family:'IBM Plex Mono',size:9},bodyFont:{family:'IBM Plex Mono',size:9}}}}};
  }else{
    const cd=s.rcs.map(v=>v===null?NaN:v);
    cfg={type:'line',data:{labels:DATES,datasets:[{label:'Correlation',data:cd,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,0.08)',fill:true,borderWidth:1.3,pointRadius:0,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'#3f3f46',font:{size:8},maxTicksLimit:8},grid:{color:'rgba(217,119,6,0.03)'}},y:{min:0,max:1,ticks:{color:'#3f3f46',font:{size:8}},grid:{color:'rgba(217,119,6,0.03)'}}},plugins:{legend:{display:false},annotation:{annotations:{mc:{type:'line',yMin:S.mc,yMax:S.mc,borderColor:'rgba(217,119,6,0.25)',borderDash:[4,3]}}},tooltip:{backgroundColor:'rgba(8,10,16,0.96)',borderColor:'rgba(217,119,6,0.15)',borderWidth:1,cornerRadius:4,titleFont:{family:'IBM Plex Mono',size:9},bodyFont:{family:'IBM Plex Mono',size:9}}}}};
  }
  S.chart=new Chart(ctx,cfg);
}

// ═══════════════════════════════════════════════════════════════════════
// ALERT ENGINE
// ═══════════════════════════════════════════════════════════════════════
function fireAlert(a){
  S.alerts=[a,...S.alerts].slice(0,80);
  S.unread++;

  // Toast
  const box=document.getElementById('toastBox');
  if(box){
    const el=document.createElement('div');
    el.className='toast';
    el.style.borderLeft=`3px solid ${a.color}`;
    el.innerHTML=`<div style="display:flex;align-items:flex-start;gap:8px">
      <span style="font-size:16px">${a.icon}</span>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between"><span style="font-family:var(--mono);font-size:9px;font-weight:700;color:${a.color};letter-spacing:0.5px">${a.title}</span><span style="font-family:var(--mono);font-size:8px;color:#57534e">${a.time}</span></div>
        <div style="font-family:var(--mono);font-size:10.5px;font-weight:600;color:#e7e5e4;margin-top:2px">${a.pair}</div>
        <div style="font-family:var(--mono);font-size:9.5px;color:#78716c;margin-top:1px">${a.body}</div>
      </div>
    </div>`;
    el.onclick=()=>{if(S.pairs[a.pIdx]){S.sel=S.pairs[a.pIdx];S.tab='detail';S.dv='zscore';render();haptic()}};
    box.prepend(el);
    haptic(a.priority>=3?'heavy':'light');
    setTimeout(()=>{el.classList.add('exit');setTimeout(()=>el.remove(),400)},5000);
    // Keep max 3 toasts
    while(box.children.length>3)box.lastChild.remove();
  }

  // Native notification
  if(a.priority>=2) sendLocalNotif(`${a.title}: ${a.pair}`, a.body, `pair-${a.pair}`);

  // Update bell
  const bell=document.querySelector('[onclick*="alerts"]');
  if(S.tab!=="alerts")render(); // re-render to update badge count
}

setInterval(()=>{
  if(!S.alertsOn||!S.pairs.length)return;
  const idx=Math.floor(Math.random()*S.pairs.length);
  const p=S.pairs[idx];if(!p)return;
  const jit=(Math.random()-0.5)*0.4,fz=p.z+jit,az=Math.abs(fz),t=ts();
  let alert=null;

  if(az>=2.5)
    alert={id:Date.now(),type:"EXTREME",icon:"🔴",color:"#dc2626",pair:p.name,sector:p.sec,title:`EXTREME ${fz>0?"A RICH":"B RICH"}`,body:`Z = ${fz>0?"+":""}${fz.toFixed(2)}σ · ρ=${p.corr.toFixed(2)}${p.hl?` · t½=${p.hl.toFixed(0)}d`:''}`,time:t,priority:3,pIdx:idx};
  else if(az>=S.th&&Math.random()>0.5)
    alert={id:Date.now(),type:"BREACH",icon:"⚡",color:"#ef4444",pair:p.name,sector:p.sec,title:"THRESHOLD BREACH",body:`Z → ${fz>0?"+":""}${fz.toFixed(2)}σ`,time:t,priority:2,pIdx:idx};
  else if(p.em&&Math.random()>0.7)
    alert={id:Date.now(),type:"NEW",icon:"✦",color:"#22d3ee",pair:p.name,sector:p.sec,title:"NEW PAIR DISCOVERED",body:`ρ emerged at ${p.corr.toFixed(2)}`,time:t,priority:2,pIdx:idx};
  else if(p.hl&&p.hl<8&&az>=1.5&&Math.random()>0.6)
    alert={id:Date.now(),type:"FAST",icon:"⏱",color:"#a78bfa",pair:p.name,sector:p.sec,title:"FAST REVERSION",body:`t½=${p.hl.toFixed(1)}d · Z=${fz.toFixed(2)}σ`,time:t,priority:2,pIdx:idx};
  else if(az<0.5&&Math.random()>0.85)
    alert={id:Date.now(),type:"REVERT",icon:"↩",color:"#22c55e",pair:p.name,sector:p.sec,title:"MEAN REVERTED",body:`Z back to ${fz.toFixed(2)}σ`,time:t,priority:1,pIdx:idx};

  if(alert)fireAlert(alert);
},7000);

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
render();
requestNotifPermission();
</script>
</body>
